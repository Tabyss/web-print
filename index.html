<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Test</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #333; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        
        .form-group { text-align: left; margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: bold; color: #4a5568; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .form-group input:focus { border-color: #3b82f6; outline: none; }

        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }

        button { border: none; padding: 15px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; color: white; margin-top: 10px; margin-bottom: 10px; }
        .btn-receipt { background-color: #10b981; }
        .btn-label { background-color: #3b82f6; }
        button:active { opacity: 0.8; }
        
        .status-box { margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 0.9rem; background: #f8fafc; border: 1px solid #e2e8f0; word-wrap: break-word; text-align: center; }
        .error { color: #ef4444; font-weight: bold; background: #fef2f2; }
        .success { color: #10b981; font-weight: bold; background: #f0fdf4; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Cetak Struk Dinamis (VSC MP-58C)</h2>
        
        <div class="row">
            <div class="form-group">
                <label>Nama Kasir:</label>
                <input type="text" id="rcptCashier" value="Admin Jarivis">
            </div>
            <div class="form-group">
                <label>Metode Bayar:</label>
                <input type="text" id="rcptMethod" value="QRIS BCA">
            </div>
        </div>

        <div class="form-group">
            <label>Nama Item yang Dibeli:</label>
            <input type="text" id="rcptItemName" value="Kopi Susu Aren Spesial">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Harga Satuan:</label>
                <input type="number" id="rcptItemPrice" value="25000">
            </div>
            <div class="form-group">
                <label>Jumlah (Qty):</label>
                <input type="number" id="rcptItemQty" value="2">
            </div>
        </div>
        
        <button class="btn-receipt" onclick="printReceipt()">Koneksikan & Cetak Struk</button>
        <div id="status-receipt" class="status-box">Status: Menunggu instruksi...</div>
    </div>

    <div class="card">
        <h2>Cetak Label Dinamis (Clabel CT221B)</h2>
        
        <div class="form-group">
            <label>Nama Produk (Stiker):</label>
            <input type="text" id="lblItemName" value="Matcha Latte Premium">
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>Harga Jual:</label>
                <input type="number" id="lblItemPrice" value="22000">
            </div>
            <div class="form-group">
                <label>Kode Barcode:</label>
                <input type="text" id="lblBarcode" value="MCH00123">
            </div>
        </div>
        
        <button class="btn-label" onclick="printLabel()">Koneksikan & Cetak Label</button>
        <div id="status-label" class="status-box">Status: Menunggu instruksi...</div>
    </div>

    <script type="module">
        import ReceiptPrinterEncoder from 'https://esm.sh/@point-of-sale/receipt-printer-encoder';

        // --- Fungsi Utilitas ---
        window.updateStatus = function(id, message, type = 'info') {
            const el = document.getElementById(id);
            el.innerHTML = message;
            el.className = `status-box ${type}`;
        };

        function sanitizeTSPL(text) {
            return text.replace(/"/g, "'");
        }

        // --- Helper Auto-Connect ---
        async function getBluetoothDevice(requestOptions, allowedPrefixes, statusId) {
            if (navigator.bluetooth.getDevices) {
                try {
                    window.updateStatus(statusId, 'auto connect browser...', 'info');
                    const savedDevices = await navigator.bluetooth.getDevices();
                    
                    const targetDevice = savedDevices.find(device => {
                        if (!device.name) return false;
                        if (allowedPrefixes.length === 0) return true; // Untuk Struk (acceptAllDevices)
                        return allowedPrefixes.some(prefix => device.name.startsWith(prefix));
                    });

                    if (targetDevice) {
                        window.updateStatus(statusId, `${targetDevice.name} connecting`, 'success');
                        return targetDevice; 
                    }
                } catch (error) {
                    console.warn("Fitur getDevices error:", error);
                }
            }
            window.updateStatus(statusId, 'Pencarian Bluetooth...', 'info');
            return await navigator.bluetooth.requestDevice(requestOptions);
        }

        // --- Helper Eksekusi Data (Chunking) ---
        async function sendDataToPrinter(device, payloadBytes, statusId) {
            window.updateStatus(statusId, `Menghubungkan ke ${device.name}...`, 'info');
            const server = await device.gatt.connect();
            const services = await server.getPrimaryServices();
            let targetCharacteristic = null;

            for (const service of services) {
                const characteristics = await service.getCharacteristics();
                targetCharacteristic = characteristics.find(
                    c => c.properties.write || c.properties.writeWithoutResponse
                );
                if (targetCharacteristic) break;
            }

            if (!targetCharacteristic) throw new Error("Jalur Write tidak ditemukan pada printer.");

            window.updateStatus(statusId, 'Mengirim data ke printer...', 'info');
            const canWriteWithoutResponse = targetCharacteristic.properties.writeWithoutResponse;

            for (let offset = 0; offset < payloadBytes.length; offset += 100) {
                const chunk = payloadBytes.slice(offset, offset + 100);
                if (canWriteWithoutResponse) {
                    await targetCharacteristic.writeValueWithoutResponse(chunk);
                } else {
                    await targetCharacteristic.writeValue(chunk);
                }
            }

            device.gatt.disconnect();
            window.updateStatus(statusId, 'Cetak Berhasil!', 'success');
        }

        // ================= EKSEKUSI CETAK STRUK =================
        window.printReceipt = async function() {
            if (!navigator.bluetooth) return window.updateStatus('status-receipt', 'Bluetooth tidak didukung.', 'error');
            
            try {
                // Ambil Data Input
                const cashier = document.getElementById('rcptCashier').value || "-";
                const method = document.getElementById('rcptMethod').value || "-";
                const itemName = document.getElementById('rcptItemName').value || "Item";
                const price = parseInt(document.getElementById('rcptItemPrice').value) || 0;
                const qty = parseInt(document.getElementById('rcptItemQty').value) || 1;
                const total = price * qty;
                const dateStr = new Date().toLocaleString('id-ID');

                // Susun Struk ESC/POS
                let encoder = new ReceiptPrinterEncoder()
                    .initialize()
                    .align('center')
                    .bold(true).line('JARIVIS STORE').bold(false)
                    .line('Jl. Contoh Toko No.123')
                    .newline()
                    .align('left')
                    .line(`Kasir  : ${cashier}`)
                    .line(`Waktu  : ${dateStr}`)
                    .line(`Metode : ${method}`)
                    .line('--------------------------------');

                // Logika padding harga struk
                const qtyPriceStr = `${qty}x ${price.toLocaleString('id-ID')}`;
                const totalLineStr = total.toLocaleString('id-ID');
                const padLength = 32 - totalLineStr.length; // Lebar standar kertas 58mm
                const lineItem = (qtyPriceStr.padEnd(padLength, ' ')) + totalLineStr;

                const payloadBytes = encoder
                    .line(itemName)
                    .line(lineItem)
                    .line('--------------------------------')
                    .align('right')
                    .bold(true).line(`TOTAL: Rp ${total.toLocaleString('id-ID')}`).bold(false)
                    .newline()
                    .align('center')
                    .line('Terima Kasih!')
                    .newline().newline().newline()
                    .cut('full')
                    .encode();

                // Setup Koneksi Struk
                const requestOptions = {
                    acceptAllDevices: true,
                    optionalServices: [
                        "000018f0-0000-1000-8000-00805f9b34fb",
                        "0000ff00-0000-1000-8000-00805f9b34fb",
                        "49535343-fe7d-4ae5-8fa9-9fafd205e455",
                        "0000ffe0-0000-1000-8000-00805f9b34fb"
                    ]
                };

                const device = await getBluetoothDevice(requestOptions, [], 'status-receipt');
                await sendDataToPrinter(device, payloadBytes, 'status-receipt');

            } catch (error) {
                window.updateStatus('status-receipt', `Gagal: ${error.message}`, 'error');
            }
        };

        // ================= EKSEKUSI CETAK LABEL =================
        window.printLabel = async function() {
            if (!navigator.bluetooth) return window.updateStatus('status-label', 'Bluetooth tidak didukung.', 'error');
            
            try {
                // Ambil Data Input
                const name = document.getElementById('lblItemName').value || "-";
                const price = parseInt(document.getElementById('lblItemPrice').value) || 0;
                const barcode = document.getElementById('lblBarcode').value || "0000";
                const formattedPrice = "Rp " + price.toLocaleString("id-ID");

                // Susun Template TSPL
                const tsplString = [
                    "SIZE 50 mm,30 mm",
                    "GAP 2 mm,0 mm",
                    "DIRECTION 1",
                    "DENSITY 15",
                    "CLS",
                    `TEXT 20,20,"4",0,1,1,"${sanitizeTSPL(name)}"`,
                    `TEXT 20,70,"4",0,1,1,"${formattedPrice}"`,
                    `BARCODE 20,120,"128",60,1,0,2,2,"${sanitizeTSPL(barcode)}"`,
                    "PRINT 1,1"
                ].join("\r\n") + "\r\n";

                const encoder = new TextEncoder();
                const payloadBytes = encoder.encode(tsplString);

                // Setup Koneksi Clabel
                const requestOptions = {
                    filters: [{ namePrefix: "CT221B" }, { namePrefix: "Clabel" }],
                    optionalServices: [
                        "000018f0-0000-1000-8000-00805f9b34fb",
                        "49535343-fe7d-4ae5-8fa9-9fafd205e455",
                        "e7810a71-73ae-499d-8c15-faa9aef0c3f2"
                    ]
                };

                const allowedNames = ["CT221B", "Clabel"];
                const device = await getBluetoothDevice(requestOptions, allowedNames, 'status-label');
                await sendDataToPrinter(device, payloadBytes, 'status-label');

            } catch (error) {
                window.updateStatus('status-label', `Gagal: ${error.message}`, 'error');
            }
        };
    </script>
</body>
</html>
