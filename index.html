<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarivis Print Test (All Bluetooth)</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #333; }
        button { border: none; padding: 15px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; color: white; margin-bottom: 10px; }
        .btn-receipt { background-color: #10b981; }
        .btn-label { background-color: #3b82f6; }
        button:active { opacity: 0.8; }
        .status-box { margin-top: 15px; padding: 10px; border-radius: 6px; font-size: 0.9rem; background: #f8fafc; border: 1px solid #e2e8f0; word-wrap: break-word; }
        .error { color: #ef4444; font-weight: bold; }
        .success { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🧾 Test Printer Struk (via Bluetooth)</h2>
        <button class="btn-receipt" onclick="printReceiptBT()">Koneksikan & Cetak Struk</button>
        <div id="status-receipt" class="status-box">Status: Menunggu instruksi...</div>
    </div>

    <div class="card">
        <h2>🏷️ Test Printer Clabel (via Bluetooth)</h2>
        <button class="btn-label" onclick="printLabelBT()">Koneksikan & Cetak Label</button>
        <div id="status-label" class="status-box">Status: Menunggu instruksi...</div>
    </div>

    <script type="module">
        import ReceiptPrinterEncoder from 'https://esm.sh/@point-of-sale/receipt-printer-encoder';

        // --- 1. FUNGSI UTILITAS UI ---
        window.updateStatus = function(id, message, type = 'info') {
            const el = document.getElementById(id);
            el.innerHTML = message;
            el.className = `status-box ${type}`;
            console.log(`[${type.toUpperCase()}] ${message}`);
        };

        // --- 2. FUNGSI INTI BLUETOOTH (Dipakai Bersama) ---
        async function connectAndWriteBLE(requestOptions, payloadBytes, statusId) {
            if (!navigator.bluetooth) {
                throw new Error('Web Bluetooth API tidak didukung di browser ini.');
            }

            window.updateStatus(statusId, 'Membuka pop-up pencarian Bluetooth...', 'info');
            const device = await navigator.bluetooth.requestDevice(requestOptions);

            window.updateStatus(statusId, `Terhubung ke ${device.name}. Menyiapkan layanan...`, 'info');
            const server = await device.gatt.connect();

            let targetCharacteristic = null;
            const services = await server.getPrimaryServices();

            // Mencari jalur Write secara otomatis dari service yang tersedia
            for (const service of services) {
                const characteristics = await service.getCharacteristics();
                targetCharacteristic = characteristics.find(
                    c => c.properties.write || c.properties.writeWithoutResponse
                );
                if (targetCharacteristic) break;
            }

            if (!targetCharacteristic) {
                device.gatt.disconnect();
                throw new Error("Gagal menemukan jalur Write pada printer ini.");
            }

            window.updateStatus(statusId, 'Mengirim data ke printer...', 'info');
            
            // Mekanisme Chunking (Kirim per 100 byte agar stabil)
            const CHUNK_SIZE = 100;
            const canWriteWithoutResponse = targetCharacteristic.properties.writeWithoutResponse;

            for (let offset = 0; offset < payloadBytes.length; offset += CHUNK_SIZE) {
                const chunk = payloadBytes.slice(offset, offset + CHUNK_SIZE);
                if (canWriteWithoutResponse) {
                    await targetCharacteristic.writeValueWithoutResponse(chunk);
                } else {
                    await targetCharacteristic.writeValue(chunk);
                }
            }

            // Selalu putus koneksi setelah selesai
            device.gatt.disconnect();
            window.updateStatus(statusId, 'Cetak Bluetooth Berhasil!', 'success');
        }


        // --- 3. EKSEKUSI CETAK STRUK ---
        window.printReceiptBT = async function() {
            try {
                // Generate format struk menggunakan Encoder
                const receiptBytes = new ReceiptPrinterEncoder()
                    .initialize()
                    .align('center')
                    .bold(true)
                    .line('JARIVIS STORE')
                    .bold(false)
                    .line('Test Struk Bluetooth')
                    .newline()
                    .align('left')
                    .line('Kopi Hitam             15.000')
                    .line('Nasi Goreng            25.000')
                    .newline()
                    .align('right')
                    .bold(true)
                    .line('TOTAL: 40.000')
                    .bold(false)
                    .align('center')
                    .line(new Date().toLocaleString())
                    .newline()
                    .cut('full')
                    .encode();

                // Parameter Bluetooth untuk Printer Struk Generik
                const requestOptions = {
                    acceptAllDevices: true,
                    optionalServices: [
                        "000018f0-0000-1000-8000-00805f9b34fb",
                        "0000ff00-0000-1000-8000-00805f9b34fb",
                        "49535343-fe7d-4ae5-8fa9-9fafd205e455",
                        "0000ffe0-0000-1000-8000-00805f9b34fb"
                    ]
                };

                await connectAndWriteBLE(requestOptions, receiptBytes, 'status-receipt');

            } catch (error) {
                window.updateStatus('status-receipt', `Gagal: ${error.message}`, 'error');
            }
        };


        // --- 4. EKSEKUSI CETAK LABEL (CLABEL) ---
        window.printLabelBT = async function() {
            try {
                // Data CPCL untuk Clabel
                let cpcl = "";
                cpcl += "! 0 200 200 240 1\r\n"; 
                cpcl += "PAGE-WIDTH 400\r\n";     
                cpcl += "TEXT 4 0 10 10 TEST JARIVIS\r\n"; 
                cpcl += "TEXT 4 0 10 70 Rp 99.000\r\n";
                cpcl += "BARCODE 128 1 1 50 10 130 JARIVIS123\r\n";
                cpcl += "PRINT\r\n";

                const encoder = new TextEncoder();
                const labelBytes = encoder.encode(cpcl);

                // Parameter Bluetooth spesifik untuk Clabel (Sesuai request)
                const requestOptions = {
                    filters: [{ namePrefix: "CT221B" }, { namePrefix: "Clabel" }],
                    optionalServices: [
                        "000018f0-0000-1000-8000-00805f9b34fb",
                        "49535343-fe7d-4ae5-8fa9-9fafd205e455",
                        "e7810a71-73ae-499d-8c15-faa9aef0c3f2"
                    ]
                };

                await connectAndWriteBLE(requestOptions, labelBytes, 'status-label');

            } catch (error) {
                window.updateStatus('status-label', `Gagal: ${error.message}`, 'error');
            }
        };
    </script>
</body>
</html>
