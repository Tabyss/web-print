<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarivis Separated Print Test</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #333; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        
        .form-group { text-align: left; margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: bold; color: #4a5568; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .form-group input:focus { border-color: #3b82f6; outline: none; }

        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }
        .row .btn-group { display: flex; gap: 10px; flex: 1; margin-top: 10px; margin-bottom: 10px; }

        button { border: none; padding: 15px; font-size: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; color: white; }
        .btn-connect { background-color: #f59e0b; color: #fff; }
        .btn-print { background-color: #10b981; }
        .btn-label-connect { background-color: #6366f1; color: #fff; }
        .btn-label-print { background-color: #3b82f6; }
        button:active { opacity: 0.8; }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        
        .status-box { margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 0.9rem; background: #f8fafc; border: 1px solid #e2e8f0; word-wrap: break-word; text-align: center; }
        .error { color: #ef4444; font-weight: bold; background: #fef2f2; }
        .success { color: #10b981; font-weight: bold; background: #f0fdf4; }
        .connected { color: #3b82f6; font-weight: bold; background: #eff6ff; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Cetak Struk (VSC MP-58C)</h2>
        
        <div class="row">
            <div class="form-group"><label>Nama Kasir:</label><input type="text" id="rcptCashier" value="Admin Jarivis"></div>
            <div class="form-group"><label>Metode Bayar:</label><input type="text" id="rcptMethod" value="QRIS BCA"></div>
        </div>
        <div class="form-group"><label>Nama Item:</label><input type="text" id="rcptItemName" value="Kopi Susu Aren Spesial"></div>
        <div class="row">
            <div class="form-group"><label>Harga Satuan:</label><input type="number" id="rcptItemPrice" value="25000"></div>
            <div class="form-group"><label>Jumlah (Qty):</label><input type="number" id="rcptItemQty" value="2"></div>
        </div>
        
        <div class="row btn-group">
            <button class="btn-connect" id="btnConnectReceipt" onclick="connectReceiptPrinter()">Hubungkan</button>
            <button class="btn-print" id="btnPrintReceipt" onclick="executePrintReceipt()" disabled>Cetak</button>
        </div>
        <div id="status-receipt" class="status-box">Status: Belum Terhubung</div>
    </div>

    <div class="card">
        <h2>Cetak Label (Clabel CT221B)</h2>
        
        <div class="form-group"><label>Nama Produk:</label><input type="text" id="lblItemName" value="Matcha Latte Premium"></div>
        <div class="row">
            <div class="form-group"><label>Harga Jual:</label><input type="number" id="lblItemPrice" value="22000"></div>
            <div class="form-group"><label>Barcode:</label><input type="text" id="lblBarcode" value="MCH00123"></div>
        </div>
        
        <div class="row btn-group">
            <button class="btn-label-connect" id="btnConnectLabel" onclick="connectLabelPrinter()">Hubungkan</button>
            <button class="btn-label-print" id="btnPrintLabel" onclick="executePrintLabel()" disabled>Cetak</button>
        </div>
        <div id="status-label" class="status-box">Status: Belum Terhubung</div>
    </div>

    <script type="module">
        import ReceiptPrinterEncoder from 'https://esm.sh/@point-of-sale/receipt-printer-encoder';

        // VARIABEL GLOBAL UNTUK MENYIMPAN KONEKSI
        let receiptDeviceObj = null;
        let receiptCharObj = null;

        let labelDeviceObj = null;
        let labelCharObj = null;

        window.updateStatus = function(id, message, type = 'info') {
            document.getElementById(id).innerHTML = message;
            document.getElementById(id).className = `status-box ${type}`;
        };

        function sanitizeTSPL(text) {
            return text.replace(/"/g, "'");
        }

        // --- CORE KONEKSI (Hanya membuka jembatan, tidak mencetak) ---
        async function establishConnection(requestOptions, allowedPrefixes, statusId) {
            if (!navigator.bluetooth) throw new Error("Bluetooth tidak didukung.");

            let device = null;
            
            // Coba ambil dari memori dulu
            if (navigator.bluetooth.getDevices) {
                try {
                    window.updateStatus(statusId, 'Mengecek memori...', 'info');
                    const savedDevices = await navigator.bluetooth.getDevices();
                    device = savedDevices.find(d => {
                        if (!d.name) return false;
                        if (allowedPrefixes.length === 0) return true;
                        return allowedPrefixes.some(prefix => d.name.startsWith(prefix));
                    });
                } catch (e) { console.warn(e); }
            }

            // Jika di memori tidak ada, buka pop-up
            if (!device) {
                window.updateStatus(statusId, 'Membuka pop-up pencarian...', 'info');
                device = await navigator.bluetooth.requestDevice(requestOptions);
            }

            window.updateStatus(statusId, `Menghubungkan ke ${device.name}...`, 'info');
            const server = await device.gatt.connect();
            const services = await server.getPrimaryServices();
            let characteristic = null;

            for (const service of services) {
                const characteristics = await service.getCharacteristics();
                characteristic = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);
                if (characteristic) break;
            }

            if (!characteristic) throw new Error("Gagal menemukan jalur Write.");
            
            return { device, characteristic };
        }

        // --- CORE PENGIRIMAN DATA (Memakai jembatan yang sudah terbuka) ---
        async function sendChunks(characteristic, payloadBytes) {
            const canWriteWithoutResponse = characteristic.properties.writeWithoutResponse;
            for (let offset = 0; offset < payloadBytes.length; offset += 100) {
                const chunk = payloadBytes.slice(offset, offset + 100);
                if (canWriteWithoutResponse) {
                    await characteristic.writeValueWithoutResponse(chunk);
                } else {
                    await characteristic.writeValue(chunk);
                }
            }
            // KUNCI: KITA TIDAK MEMANGGIL device.gatt.disconnect() DI SINI
        }


        // ================= TOMBOL HUBUNGKAN (STRUK) =================
        window.connectReceiptPrinter = async function() {
            try {
                const reqOptions = {
                    acceptAllDevices: true,
                    optionalServices: [
                        "000018f0-0000-1000-8000-00805f9b34fb",
                        "0000ff00-0000-1000-8000-00805f9b34fb",
                        "49535343-fe7d-4ae5-8fa9-9fafd205e455",
                        "0000ffe0-0000-1000-8000-00805f9b34fb"
                    ]
                };
                
                const connection = await establishConnection(reqOptions, [], 'status-receipt');
                receiptDeviceObj = connection.device;
                receiptCharObj = connection.characteristic;

                window.updateStatus('status-receipt', `✅ Terhubung: ${receiptDeviceObj.name}`, 'connected');
                document.getElementById('btnPrintReceipt').disabled = false;
                
            } catch (error) {
                window.updateStatus('status-receipt', `Gagal: ${error.message}`, 'error');
            }
        };

        // ================= TOMBOL CETAK (STRUK) =================
        window.executePrintReceipt = async function() {
            if (!receiptCharObj || !receiptDeviceObj.gatt.connected) {
                return window.updateStatus('status-receipt', 'Koneksi terputus. Klik Hubungkan lagi.', 'error');
            }

            try {
                window.updateStatus('status-receipt', 'Mencetak...', 'info');
                
                const cashier = document.getElementById('rcptCashier').value || "-";
                const method = document.getElementById('rcptMethod').value || "-";
                const itemName = document.getElementById('rcptItemName').value || "Item";
                const price = parseInt(document.getElementById('rcptItemPrice').value) || 0;
                const qty = parseInt(document.getElementById('rcptItemQty').value) || 1;
                const total = price * qty;
                const padLength = 32 - total.toLocaleString('id-ID').length;
                const lineItem = (`${qty}x ${price.toLocaleString('id-ID')}`.padEnd(padLength, ' ')) + total.toLocaleString('id-ID');

                let encoder = new ReceiptPrinterEncoder()
                    .initialize()
                    .align('center').bold(true).line('JARIVIS STORE').bold(false)
                    .newline()
                    .align('left').line(`Kasir  : ${cashier}`).line(`Metode : ${method}`)
                    .line('--------------------------------')
                    .line(itemName).line(lineItem)
                    .line('--------------------------------')
                    .align('right').bold(true).line(`TOTAL: Rp ${total.toLocaleString('id-ID')}`).bold(false)
                    .newline().newline().cut('full').encode();

                await sendChunks(receiptCharObj, encoder);
                window.updateStatus('status-receipt', '✅ Cetak Selesai! (Siap cetak lagi)', 'connected');
            } catch (error) {
                window.updateStatus('status-receipt', `Gagal Cetak: ${error.message}`, 'error');
            }
        };

        // ================= TOMBOL HUBUNGKAN (LABEL) =================
        window.connectLabelPrinter = async function() {
            try {
                const reqOptions = {
                    filters: [{ namePrefix: "CT221B" }, { namePrefix: "Clabel" }],
                    optionalServices: [
                        "000018f0-0000-1000-8000-00805f9b34fb",
                        "49535343-fe7d-4ae5-8fa9-9fafd205e455",
                        "e7810a71-73ae-499d-8c15-faa9aef0c3f2"
                    ]
                };
                
                const connection = await establishConnection(reqOptions, ["CT221B", "Clabel"], 'status-label');
                labelDeviceObj = connection.device;
                labelCharObj = connection.characteristic;

                window.updateStatus('status-label', `✅ Terhubung: ${labelDeviceObj.name}`, 'connected');
                document.getElementById('btnPrintLabel').disabled = false;
                
            } catch (error) {
                window.updateStatus('status-label', `Gagal: ${error.message}`, 'error');
            }
        };

        // ================= TOMBOL CETAK (LABEL) =================
        window.executePrintLabel = async function() {
            if (!labelCharObj || !labelDeviceObj.gatt.connected) {
                return window.updateStatus('status-label', 'Koneksi terputus. Klik Hubungkan lagi.', 'error');
            }

            try {
                window.updateStatus('status-label', 'Mencetak Label...', 'info');
                
                const name = document.getElementById('lblItemName').value || "-";
                const price = parseInt(document.getElementById('lblItemPrice').value) || 0;
                const barcode = document.getElementById('lblBarcode').value || "0000";

                const tsplString = [
                    "SIZE 50 mm,30 mm", "GAP 2 mm,0 mm", "DIRECTION 1", "DENSITY 15", "CLS",
                    `TEXT 20,20,"4",0,1,1,"${sanitizeTSPL(name)}"`,
                    `TEXT 20,70,"4",0,1,1,"Rp ${price.toLocaleString("id-ID")}"`,
                    `BARCODE 20,120,"128",60,1,0,2,2,"${sanitizeTSPL(barcode)}"`,
                    "PRINT 1,1"
                ].join("\r\n") + "\r\n";

                const payloadBytes = new TextEncoder().encode(tsplString);
                await sendChunks(labelCharObj, payloadBytes);
                
                window.updateStatus('status-label', '✅ Cetak Selesai! (Siap cetak lagi)', 'connected');
            } catch (error) {
                window.updateStatus('status-label', `Gagal Cetak: ${error.message}`, 'error');
            }
        };
    </script>
</body>
</html>
